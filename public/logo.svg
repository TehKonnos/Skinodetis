<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 290 80" role="img" aria-label="Σκηνοδέτης">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <!-- Subtle inner shadow on curtains -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- ── Icon background ── -->
  <rect x="4" y="4" width="72" height="72" rx="14" fill="url(#iconGrad)"/>

  <!-- Valance (decorative top bar of the stage) -->
  <rect x="12" y="12" width="56" height="9" rx="4.5" fill="white" opacity="0.92"/>

  <!-- Left curtain -->
  <path d="M 12,20 L 36,20 C 34,38 20,50 23,70 L 12,70 Z"
        fill="white" opacity="0.90" filter="url(#softShadow)"/>
  <!-- Left curtain inner fold highlight -->
  <path d="M 32,20 C 30,38 22,50 24,70"
        stroke="white" stroke-width="1.2" fill="none" opacity="0.35"/>

  <!-- Right curtain -->
  <path d="M 68,20 L 44,20 C 46,38 60,50 57,70 L 68,70 Z"
        fill="white" opacity="0.90" filter="url(#softShadow)"/>
  <!-- Right curtain inner fold highlight -->
  <path d="M 48,20 C 50,38 58,50 56,70"
        stroke="white" stroke-width="1.2" fill="none" opacity="0.35"/>

  <!-- Stage floor -->
  <rect x="23" y="66" width="34" height="5" rx="2.5" fill="white" opacity="0.55"/>

  <!-- Spotlight glow -->
  <ellipse cx="40" cy="46" rx="8" ry="8" fill="white" opacity="0.18"/>

  <!-- Star -->
  <text x="40" y="54" font-size="17" text-anchor="middle" fill="#fde047"
        font-family="Arial, sans-serif">★</text>

  <!-- ── Wordmark ── -->
  <text x="88" y="49"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="30"
        font-weight="700"
        letter-spacing="-0.3"
        fill="url(#nameGrad)">Σκηνοδέτης</text>

  <!-- Tagline -->
  <text x="90" y="65"
        font-family="Arial, Helvetica, sans-serif"
        font-size="10"
        font-weight="600"
        letter-spacing="2.8"
        fill="#6b7280">ΠΑΙΔΙΚΑ ΘΕΑΤΡΙΚΑ ΕΡΓΑ</text>
</svg>
